# ============================================================================
# docker/web/nginx.conf
# ============================================================================
#
# Nginx virtual host for Farmaura local web access.
#
# Responsibilities:
# - expose marketplace and internal portals over HTTP;
# - serve static shared assets from the repository snapshot;
# - reverse proxy API requests to the backend service container;
#
# Observations:
# - both portals are intentionally served from one origin in development;
# - direct API exposure remains available separately on port 8080.

server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;
    etag off;

    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location = / {
        try_files /index.html =404;
    }

    # Both portals push real sub-routes client-side (e.g. /marketplace/product/123,
    # /internal/orders) via react-router, so any path under these prefixes must
    # fall back to the portal's HTML shell — not just the exact "/marketplace"
    # and "/internal" roots — or a refresh/deep link 404s.
    location = /marketplace {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files /farmaura/marketplace.html =404;
    }

    location /marketplace/ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri /farmaura/marketplace.html;
    }

    location = /internal {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files /farmaura/internal.html =404;
    }

    location /internal/ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri /farmaura/internal.html;
    }

    location /api/v1/ {
        proxy_pass http://farmaura_api:8080/api/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Regulatory placeholder images and any backend-hosted product photo are served by the
    # API under /static (app/main.py mounts StaticFiles there); the browser resolves the
    # relative image_url the catalog API returns against this origin, so it must proxy here
    # too, not just /api/v1/.
    location /static/ {
        proxy_pass http://farmaura_api:8080/static/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /farmaura/ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri =404;
    }

    location = /.well-known/appspecific/com.chrome.devtools.json {
        access_log off;
        log_not_found off;
        return 204;
    }
}
